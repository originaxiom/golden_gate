site_name: golden_gate
site_description: Exact-arithmetic engines for Fibonacci-anyon quantum topology, and a braid-gate compiler.
repo_url: https://github.com/originaxiom/golden_gate
repo_name: originaxiom/golden_gate
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false

nav:
  - Home: index.md
  - The mathematics: MATH.md
  - Worked examples: EXAMPLES.md
  - API reference: API.md
  - Demo reference (auto): reference.md
  - Tools paper (draft): PAPER.md
  - Interactive explorer: explorer.html
