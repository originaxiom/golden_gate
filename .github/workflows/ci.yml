name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC — the slow sweeps + dependency audit

jobs:
  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: mypy
        run: mypy

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[test]"
      - name: Byte-compile
        run: python -m compileall -q src tests
      - name: Fast test suite (with coverage)
        # 75% floor: the fast tier covers the exact core + demo well; the heavy research
        # paths (obstruction / Massey sweeps) are exercised only under OA_SLOW (the `slow` job).
        run: pytest -q --cov=golden_gate --cov-report=term-missing --cov-fail-under=75
      - name: Banked-identity + hygiene gates
        run: python -m golden_gate.core.gates

  slow:
    # the heavy exact / high-precision sweeps (OA_SLOW) + a dependency audit; run on demand
    # and weekly, not on every push.
    name: slow sweeps + audit
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[test]" pip-audit
      - name: OA_SLOW sweeps
        env:
          OA_SLOW: "1"
        run: pytest -q
      - name: Dependency audit
        run: pip-audit || true
