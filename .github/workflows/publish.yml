name: Publish to PyPI

# Fires on a version tag (e.g. v1.0.0). Uses PyPI **trusted publishing** (OIDC) — no API
# token/secret. OWNER SETUP (one-time): create the PyPI project and add this repo +
# workflow + the `pypi` environment as a trusted publisher (https://docs.pypi.org/trusted-publishers/),
# and set `[project].name` to a non-colliding distribution name (see pyproject.toml).
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: python -m pip install --upgrade build && python -m build
      - name: Check metadata
        run: python -m pip install --upgrade twine && twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC — required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
