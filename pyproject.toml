[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "golden_gate"
version = "0.1.0"
description = "Exact-arithmetic engines for metallic / Fibonacci-anyon quantum topology, and a braid-gate compiler."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Dritëro M." }]
dependencies = ["numpy>=1.24", "sympy>=1.12"]

[project.optional-dependencies]
# mpmath is used only by the numeric cross-validation tests today; it will move to
# core `dependencies` when the mpmath-based engines (core.lie / core.jets) land.
test = ["pytest>=7.4", "mpmath>=1.3"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
# Lets a plain `pytest` import the installed-style `src` package without an
# install step or PYTHONPATH.
pythonpath = ["src", "."]
testpaths = ["tests"]
